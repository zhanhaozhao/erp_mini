<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增出库单 - 非特客户管家</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        /* 顶部导航栏 */
        .top-nav {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .logo {
            display: flex;
            flex-direction: column;
            font-weight: bold;
        }

        .logo-text {
            font-size: 18px;
        }

        .logo-sub {
            font-size: 10px;
            opacity: 0.8;
        }

        .nav-center {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .nav-center a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 5px 15px;
            border-radius: 3px;
            transition: all 0.3s;
        }

        .nav-center a:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .nav-center a.active {
            background-color: #28a745;
            font-weight: bold;
        }

        .nav-right {
            display: flex;
            gap: 10px;
            font-size: 13px;
        }

        /* 主容器 */
        .main-container {
            display: flex;
            height: calc(100vh - 85px);
        }

        /* 左侧菜单 */
        .left-sidebar {
            width: 200px;
            background: white;
            border-right: 1px solid #e0e0e0;
            padding: 15px 0;
            overflow-y: auto;
        }

        .menu-title {
            padding: 10px 15px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 10px;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }

        .menu-item a {
            display: block;
            padding: 10px 15px;
            color: #666;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
        }

        .menu-item:hover a {
            background-color: #f5f5f5;
            color: #333;
        }

        .menu-item.active {
            border-left-color: #28a745;
            background-color: #f0f8f5;
        }

        .menu-item.active a {
            color: #28a745;
            font-weight: bold;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 15px 20px;
            overflow-y: auto;
            background-color: #f5f5f5;
        }

        /* 面包屑 */
        .breadcrumb {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: white;
            border-radius: 4px;
        }

        .breadcrumb a {
            color: #2a5298;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        /* 表单容器 */
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            max-width: 900px;
            margin: 0 auto 20px;
        }

        /* 表单分组标题 */
        .form-section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin: 25px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .form-section-title:first-child {
            margin-top: 0;
        }

        /* 表单行 */
        .form-row-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-row-wrapper.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .form-label .required {
            color: #dc3545;
            margin-right: 4px;
        }

        .form-control, .form-select {
            font-size: 13px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        /* 输入框组 */
        .input-group-btn {
            display: flex;
            gap: 6px;
        }

        .input-group-btn .form-control {
            flex: 1;
        }

        .btn-secondary {
            padding: 8px 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background-color: #0056b3;
        }

        .form-text {
            display: block;
            margin-top: 4px;
            font-size: 11px;
            color: #999;
        }

        /* 单选按钮组 */
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
        }

        .radio-item label {
            margin: 0;
            font-size: 13px;
            cursor: pointer;
        }

        /* 商品明细表格 */
        .goods-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 12px;
        }

        .goods-table thead {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
        }

        .goods-table th {
            padding: 10px;
            font-weight: 600;
            color: #333;
            text-align: center;
            border: 1px solid #dee2e6;
        }

        .goods-table td {
            padding: 10px;
            border: 1px solid #dee2e6;
            text-align: left;
        }

        .goods-table input[type="text"],
        .goods-table input[type="number"],
        .goods-table select {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 12px;
            box-sizing: border-box;
        }

        .goods-table input[type="checkbox"] {
            cursor: pointer;
        }

        .btn-add-goods {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add-goods:hover {
            background-color: #218838;
        }

        .btn-del-goods {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-del-goods:hover {
            background-color: #c82333;
        }

        /* 备注 */
        .textarea-group {
            grid-column: 1 / -1;
        }

        .form-control[name="remark"] {
            resize: vertical;
            min-height: 80px;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .btn-save {
            padding: 10px 30px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save:hover {
            background-color: #218838;
            box-shadow: 0 2px 6px rgba(40, 167, 69, 0.3);
        }

        .btn-back {
            padding: 10px 30px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background-color: #5a6268;
        }

        /* 文件上传 */
        .upload-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-upload {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-upload:hover {
            background-color: #0056b3;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .form-row-wrapper {
                grid-template-columns: 1fr;
            }

            .form-row-wrapper.full {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .left-sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }

            .form-container {
                padding: 15px;
            }

            .goods-table {
                font-size: 11px;
            }

            .goods-table th,
            .goods-table td {
                padding: 6px 4px;
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-nav">
        <div class="logo">
            <span class="logo-text">非特客户管家</span>
            <span class="logo-sub">FEITE INFORMATION SYSTEM</span>
        </div>
        <div class="nav-center">
            <a href="#">客户管理</a>
            <a href="#" class="active">出入库管理</a>
            <a href="#">财务</a>
            <a href="#">日常管理</a>
            <a href="#">个人资料</a>
        </div>
        <div class="nav-right">
            <span>欢迎用户（管理员）</span>
        </div>
    </div>

    <div class="main-container">
        <!-- 左侧菜单 -->
        <div class="left-sidebar">
            <div class="menu-title">功能导航</div>
            <ul class="menu-list">
                <li class="menu-item active"><a href="#"><i class="bi bi-box-seam"></i> 出库</a></li>
                <li class="menu-item"><a href="#"><i class="bi bi-archive"></i> 库存</a></li>
                <li class="menu-item"><a href="#"><i class="bi bi-graph-up"></i> 出库统计</a></li>
                <li class="menu-item"><a href="#"><i class="bi bi-list"></i> 出库明细</a></li>
                <li class="menu-item"><a href="#"><i class="bi bi-bar-chart"></i> 产品销量统计</a></li>
                <li class="menu-item"><a href="#"><i class="bi bi-people"></i> 客户购买统计</a></li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 面包屑导航 -->
            <div class="breadcrumb">
                <i class="bi bi-house"></i> 导航：<a href="#">桌面</a> >> <a href="#">出入库管理</a> >> <a href="#">出库</a> >> 新增
            </div>

            <!-- 表单 -->
            <form class="form-container" id="outboundForm">
                <!-- 客户与收货信息 -->
                <h3 class="form-section-title"><i class="bi bi-person-check"></i> 客户与收货信息</h3>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label"><span class="required">*</span>收货人</label>
                        <div class="input-group-btn">
                            <input type="text" class="form-control" placeholder="输入收货人姓名" required>
                            <button type="button" class="btn-secondary">选择客户</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><span class="required">*</span>电话</label>
                        <div class="input-group-btn">
                            <input type="text" class="form-control" placeholder="输入收货人电话" required>
                            <label style="display: flex; align-items: center; gap: 5px; white-space: nowrap; margin: 0;">
                                <input type="checkbox"> 留客户电话
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label"><span class="required">*</span>地区</label>
                        <select class="form-select" required>
                            <option value="">请选择…</option>
                            <option>北京市</option>
                            <option>上海市</option>
                            <option>广州市</option>
                            <option>深圳市</option>
                            <option>杭州市</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><span class="required">*</span>地址</label>
                        <div class="input-group-btn">
                            <input type="text" class="form-control" placeholder="输入收货地址" required>
                            <button type="button" class="btn-secondary">智能解析</button>
                        </div>
                    </div>
                </div>

                <!-- 物流信息 -->
                <h3 class="form-section-title"><i class="bi bi-truck"></i> 物流信息</h3>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">物流</label>
                        <select class="form-select">
                            <option>请选择…</option>
                            <option>中通快递</option>
                            <option>德邦快递</option>
                            <option>圆通快递</option>
                            <option>顺丰快递</option>
                            <option>申通快递</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">物流单号</label>
                        <input type="text" class="form-control" placeholder="输入物流单号">
                    </div>
                </div>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">物流费</label>
                        <div class="input-group-btn">
                            <input type="number" class="form-control" value="0" step="0.01">
                            <div class="radio-group" style="flex: 1;">
                                <label class="radio-item">
                                    <input type="radio" name="shippingPayment" value="prepaid" checked> 现付
                                </label>
                                <label class="radio-item">
                                    <input type="radio" name="shippingPayment" value="arrival"> 到付
                                </label>
                                <label class="radio-item">
                                    <input type="radio" name="shippingPayment" value="deduct"> 扣付
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">仓库</label>
                        <select class="form-select">
                            <option>仓库1</option>
                            <option>仓库2</option>
                            <option selected>仓库3</option>
                            <option>仓库4</option>
                        </select>
                    </div>
                </div>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">付款方式</label>
                        <select class="form-select">
                            <option>请选择…</option>
                            <option>现金</option>
                            <option>微信</option>
                            <option selected>物流代收</option>
                            <option>不代收</option>
                            <option>银行转账</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">付款说明</label>
                        <input type="text" class="form-control" placeholder="输入付款说明">
                    </div>
                </div>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">代收款</label>
                        <input type="number" class="form-control" value="0.00" step="0.01">
                    </div>
                </div>

                <!-- 金额与商品 -->
                <h3 class="form-section-title"><i class="bi bi-bag-check"></i> 金额与商品信息</h3>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">总金额</label>
                        <input type="number" class="form-control" value="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">抹零</label>
                        <input type="number" class="form-control" value="0" step="0.01">
                    </div>
                </div>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">订金</label>
                        <input type="number" class="form-control" value="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">预存款</label>
                        <input type="number" class="form-control" value="0" step="0.01">
                    </div>
                </div>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">预存商品</label>
                        <input type="number" class="form-control" value="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">手续费</label>
                        <input type="number" class="form-control" value="0" step="0.01">
                    </div>
                </div>

                <!-- 商品明细 -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <h4 style="margin: 0; font-size: 14px; color: #333;">商品明细</h4>
                    <button type="button" class="btn-secondary">导入明细</button>
                </div>

                <table class="goods-table">
                    <thead>
                        <tr>
                            <th style="width: 200px;">品名</th>
                            <th>规格</th>
                            <th style="width: 60px;">单位</th>
                            <th style="width: 60px;">数量</th>
                            <th style="width: 70px;">单价</th>
                            <th style="width: 70px;">金额</th>
                            <th>备注</th>
                            <th style="width: 50px;">赠品</th>
                            <th style="width: 60px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="goodsTable">
                        <tr>
                            <td>
                                <div style="display: flex; gap: 5px;">
                                    <input type="text" placeholder="选择商品">
                                    <button type="button" class="btn-add-goods" title="添加商品">+</button>
                                </div>
                            </td>
                            <td><input type="text" placeholder="规格"></td>
                            <td><select><option>袋</option><option>件</option><option>箱</option></select></td>
                            <td><input type="number" value="0" min="0"></td>
                            <td><input type="number" value="0" min="0" step="0.01"></td>
                            <td><input type="number" value="0" min="0" step="0.01" readonly></td>
                            <td><input type="text" placeholder="备注"></td>
                            <td><input type="checkbox"></td>
                            <td><button type="button" class="btn-del-goods">删除</button></td>
                        </tr>
                    </tbody>
                </table>
                <div style="margin-top: 10px;">
                    <button type="button" class="btn-secondary" id="addGoodsRow">+ 添加商品</button>
                </div>

                <!-- 其他信息 -->
                <h3 class="form-section-title"><i class="bi bi-file-text"></i> 其他信息</h3>

                <div class="form-row-wrapper textarea-group">
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" name="remark" placeholder="输入备注信息"></textarea>
                    </div>
                </div>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">业务员</label>
                        <select class="form-select">
                            <option>请选择…</option>
                            <option>司孟原</option>
                            <option>张三</option>
                            <option>王五</option>
                            <option>刘七</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">下单时间</label>
                        <input type="datetime-local" class="form-control" value="2026-05-17T19:32:48">
                    </div>
                </div>

                <div class="form-row-wrapper">
                    <div class="form-group">
                        <label class="form-label">付款凭证</label>
                        <div class="upload-group">
                            <button type="button" class="btn-upload"><i class="bi bi-plus-lg"></i> 添加凭证</button>
                            <span style="font-size: 12px; color: #999;">支持jpg、png等图片格式</span>
                        </div>
                    </div>
                </div>

                <!-- 按钮组 -->
                <div class="button-group">
                    <button type="submit" class="btn-save"><i class="bi bi-save"></i> 保存</button>
                    <button type="reset" class="btn-back"><i class="bi bi-arrow-left"></i> 返回</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 添加商品行
        document.getElementById('addGoodsRow').addEventListener('click', function(e) {
            e.preventDefault();
            const tbody = document.getElementById('goodsTable');
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" placeholder="选择商品">
                        <button type="button" class="btn-add-goods" title="添加商品">+</button>
                    </div>
                </td>
                <td><input type="text" placeholder="规格"></td>
                <td><select><option>袋</option><option>件</option><option>箱</option></select></td>
                <td><input type="number" value="0" min="0"></td>
                <td><input type="number" value="0" min="0" step="0.01"></td>
                <td><input type="number" value="0" min="0" step="0.01" readonly></td>
                <td><input type="text" placeholder="备注"></td>
                <td><input type="checkbox"></td>
                <td><button type="button" class="btn-del-goods">删除</button></td>
            `;
            tbody.appendChild(newRow);
            attachDeleteEvent(newRow);
        });

        // 删除商品行
        function attachDeleteEvent(row) {
            const deleteBtn = row.querySelector('.btn-del-goods');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    row.remove();
                });
            }
        }

        // 初始化删除按钮
        document.querySelectorAll('.btn-del-goods').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                this.closest('tr').remove();
            });
        });

        // 表单提交
        document.getElementById('outboundForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('出库单已保存！');
            // 这里可以添加实际的表单提交逻辑
        });

        // 返回按钮
        document.querySelector('button[type="reset"]').addEventListener('click', function() {
            if (confirm('确认返回吗？')) {
                window.location.href = 'outbound-list.html';
            }
        });
    </script>
</body>
</html>
