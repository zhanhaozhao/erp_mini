<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 客户管家</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 60%, #1a6b3a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        .login-card {
            background: white;
            border-radius: 8px;
            padding: 40px 44px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .logo-icon i { font-size: 28px; color: white; }
        .logo-title { font-size: 20px; font-weight: bold; color: #1e3c72; }
        .logo-sub { font-size: 11px; color: #999; margin-top: 2px; letter-spacing: 1px; }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .form-control {
            font-size: 14px;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42,82,152,0.12);
            outline: none;
        }
        .input-icon-wrap {
            position: relative;
        }
        .input-icon-wrap .bi {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 15px;
        }
        .input-icon-wrap .form-control {
            padding-left: 38px;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
            letter-spacing: 2px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #162d58, #1e3c72);
            box-shadow: 0 4px 14px rgba(42,82,152,0.4);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }

        .alert {
            font-size: 13px;
            padding: 10px 14px;
            margin-bottom: 18px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon"><i class="bi bi-box-seam"></i></div>
            <div class="logo-title">客户管家</div>
            <div class="logo-sub">CUSTOMER MANAGEMENT SYSTEM</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="post" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-person"></i>
                    <input type="text" class="form-control" name="username"
                           placeholder="请输入用户名" autofocus autocomplete="username">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">密码</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-lock"></i>
                    <input type="password" class="form-control" name="password"
                           placeholder="请输入密码" autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>

    </div>

    <div class="footer">© 客户管家</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
